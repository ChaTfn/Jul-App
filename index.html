<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#173404">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jul'App">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/favicon.ico">
  <title>Jul'App — Gestionnaire d'heures de terrain</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f3f4f0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; max-width: 480px; margin: 0 auto; background: #f3f4f0; }
    * { -webkit-tap-highlight-color: transparent; }
    input, select { font-family: inherit; font-size: 15px; width: 100%; padding: 10px 12px; border: 1px solid #d0d0c8; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
    input:focus, select:focus { border-color: #3B6D11; }
    button { cursor: pointer; font-family: inherit; }
    #splash { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #173404; }
    #splash p { color: #C0DD97; font-size: 22px; font-weight: 600; font-family: -apple-system, sans-serif; display: flex; align-items: center; gap: 10px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash"><p>&#127807; Jul'App</p></div>
  </div>

  <!-- Firebase (base de données partagée entre tous les appareils) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (compile le JSX dans le navigateur) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ═══════════════════════════════════════════════════
       CONFIGURATION FIREBASE
       Remplacez les valeurs ci-dessous par celles de
       votre projet Firebase (voir README.md)
  ═══════════════════════════════════════════════════ -->
  <script>
    const FIREBASE_CONFIG = {
      apiKey:            "VOTRE_API_KEY",
      authDomain:        "votre-projet.firebaseapp.com",
      databaseURL:       "https://votre-projet-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "votre-projet",
      storageBucket:     "votre-projet.appspot.com",
      messagingSenderId: "000000000000",
      appId:             "1:000000000000:web:000000000000"
    };

    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      window._db = firebase.database();
      window._fbOk = !FIREBASE_CONFIG.apiKey.includes("VOTRE");
    } catch(e) {
      window._fbOk = false;
    }

    // Couche de stockage : Firebase si configuré, localStorage sinon
    window.Store = {
      async get(key) {
        if (window._fbOk) {
          const s = await window._db.ref(key).get();
          return s.exists() ? s.val() : null;
        }
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : null;
      },
      async set(key, val) {
        if (window._fbOk) {
          await window._db.ref(key).set(val);
        } else {
          localStorage.setItem(key, JSON.stringify(val));
        }
      },
      listen(key, cb) {
        if (window._fbOk) {
          window._db.ref(key).on('value', s => cb(s.val()));
          return () => window._db.ref(key).off('value');
        }
        return () => {};
      }
    };
  </script>

  <!-- ═══════════════════════════════════════════════════
       APPLICATION REACT
  ═══════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TYPES = [
      { id: 'terrassement', label: 'Terrassement', icon: 'ti-mountain', color: '#854F0B', bg: '#FAEEDA', border: '#EF9F27' },
      { id: 'agricole',     label: 'Agricole',     icon: 'ti-leaf',     color: '#27500A', bg: '#EAF3DE', border: '#97C459' },
      { id: 'atelier',      label: 'Atelier',      icon: 'ti-tool',     color: '#0C447C', bg: '#E6F1FB', border: '#85B7EB' },
    ];

    const ADMIN_PIN = '1234';

    const today = () => new Date().toISOString().split('T')[0];
    const fmtDate = d => { if (!d) return ''; const [y,m,j] = d.split('-'); return `${j}/${m}/${y}`; };

    const S = {
      header: { background:'#173404', padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:10 },
      logo:   { color:'#C0DD97', fontWeight:600, fontSize:'17px', display:'flex', alignItems:'center', gap:'8px' },
      card:   { background:'#fff', border:'1px solid #e0e0d8', borderRadius:'12px', padding:'14px 16px', marginBottom:'10px' },
      lbl:    { fontSize:'11px', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'8px', display:'block' },
      ibtn:   (a) => ({ background: a ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)', border:'none', borderRadius:'6px', color:'#C0DD97', padding:'6px 9px', cursor:'pointer', display:'flex', alignItems:'center' }),
    };

    function App() {
      const [screen,   setScreen]   = useState('loading');
      const [workers,  setWorkers]  = useState([]);
      const [records,  setRecords]  = useState([]);
      const [user,     setUser]     = useState(null);
      const [type,     setType]     = useState(null);
      const [hours,    setHours]    = useState(8);
      const [date,     setDate]     = useState(today());
      const [saving,   setSaving]   = useState(false);
      const [saved,    setSaved]    = useState(false);
      const [showHist, setShowHist] = useState(false);
      const [newName,  setNewName]  = useState('');
      const [showAdd,  setShowAdd]  = useState(false);
      const [showPin,  setShowPin]  = useState(false);
      const [pin,      setPin]      = useState('');
      const [pinErr,   setPinErr]   = useState(false);
      const [fWorker,  setFWorker]  = useState('');
      const [fType,    setFType]    = useState('');

      useEffect(() => {
        (async () => {
          const [w, r] = await Promise.all([Store.get('julapp/workers'), Store.get('julapp/records')]);
          if (w) setWorkers(Object.values(w));
          if (r) setRecords(Object.values(r));
          const me = localStorage.getItem('julapp-me');
          setScreen(me ? 'entry' : 'login');
          if (me) setUser(JSON.parse(me));
        })();
      }, []);

      useEffect(() => {
        if (screen === 'loading') return;
        const u1 = Store.listen('julapp/workers', v => v && setWorkers(Object.values(v)));
        const u2 = Store.listen('julapp/records', v => v && setRecords(Object.values(v)));
        return () => { u1(); u2(); };
      }, [screen]);

      const login = w => { localStorage.setItem('julapp-me', JSON.stringify(w)); setUser(w); setScreen('entry'); };
      const logout = () => { localStorage.removeItem('julapp-me'); setUser(null); setScreen('login'); setShowHist(false); };

      const addWorker = async () => {
        const name = newName.trim(); if (!name) return;
        const w = { id: `w${Date.now()}`, name };
        const ex = await Store.get('julapp/workers') || {};
        ex[w.id] = w; await Store.set('julapp/workers', ex);
        setNewName(''); setShowAdd(false);
      };

      const submit = async () => {
        if (!type || saving) return; setSaving(true);
        const r = { id:`r${Date.now()}`, wId:user.id, wName:user.name, date, type, hours:+hours, ts:Date.now() };
        const ex = await Store.get('julapp/records') || {};
        ex[r.id] = r; await Store.set('julapp/records', ex);
        setType(null); setHours(8); setDate(today()); setSaving(false);
        setSaved(true); setTimeout(() => setSaved(false), 2500);
      };

      const checkPin = () => {
        if (pin === ADMIN_PIN) { setScreen('admin'); setShowPin(false); setPin(''); setPinErr(false); }
        else setPinErr(true);
      };

      const myRecs    = records.filter(r => r.wId === user?.id).sort((a,b) => b.date.localeCompare(a.date));
      const adminRecs = records.filter(r => (!fWorker||r.wId===fWorker)&&(!fType||r.type===fType)).sort((a,b)=>b.date.localeCompare(a.date));
      const totalH    = adminRecs.reduce((s,r)=>s+r.hours,0);

      const Header = ({sub, right}) => (
        <div style={S.header}>
          <div style={S.logo}>
            <i className="ti ti-leaf" style={{fontSize:'20px'}} />
            Jul'App {sub && <span style={{color:'#97C459',fontSize:'13px',fontWeight:400}}>— {sub}</span>}
          </div>
          <div style={{display:'flex',gap:'6px'}}>{right}</div>
        </div>
      );

      const TypeBadge = ({type:t}) => { const x = TYPES.find(i=>i.id===t); return x ? <span style={{fontSize:'11px',color:x.color,background:x.bg,padding:'2px 8px',borderRadius:'20px',fontWeight:500}}>{x.label}</span> : null; };

      /* ── CHARGEMENT ── */
      if (screen === 'loading') return null;

      /* ── CONNEXION ── */
      if (screen === 'login') return (
        <div>
          <Header />
          <div style={{padding:'20px 16px'}}>
            <p style={{fontSize:'13px',color:'#888',marginBottom:'16px'}}>Sélectionnez votre nom</p>

            {workers.length === 0 && !showAdd && (
              <div style={{...S.card,textAlign:'center',padding:'28px 16px'}}>
                <i className="ti ti-users" style={{fontSize:'28px',color:'#ccc',display:'block',marginBottom:'8px'}} />
                <p style={{color:'#888',fontSize:'14px'}}>Aucun travailleur enregistré.<br/>Ajoutez le premier ci-dessous.</p>
              </div>
            )}

            {workers.map(w => (
              <button key={w.id} onClick={()=>login(w)} style={{display:'flex',alignItems:'center',gap:'12px',width:'100%',padding:'13px 14px',marginBottom:'7px',background:'#fff',border:'1px solid #d8d8d0',borderRadius:'10px',textAlign:'left'}}>
                <div style={{width:'38px',height:'38px',borderRadius:'50%',background:'#EAF3DE',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'15px',color:'#27500A',flexShrink:0}}>{w.name[0].toUpperCase()}</div>
                <span style={{fontSize:'15px',fontWeight:500,color:'#1a1a1a'}}>{w.name}</span>
                <i className="ti ti-chevron-right" style={{fontSize:'16px',color:'#bbb',marginLeft:'auto'}} />
              </button>
            ))}

            {showAdd ? (
              <div style={{...S.card,marginTop:'4px'}}>
                <span style={S.lbl}>Nom du travailleur</span>
                <div style={{display:'flex',gap:'8px'}}>
                  <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addWorker()} placeholder="Prénom Nom" autoFocus />
                  <button onClick={addWorker} style={{padding:'0 16px',background:'#173404',color:'#C0DD97',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:600,whiteSpace:'nowrap'}}>Ajouter</button>
                </div>
                <button onClick={()=>setShowAdd(false)} style={{marginTop:'10px',background:'none',border:'none',color:'#888',fontSize:'13px'}}>Annuler</button>
              </div>
            ) : (
              <button onClick={()=>setShowAdd(true)} style={{display:'flex',alignItems:'center',gap:'8px',width:'100%',padding:'12px 14px',background:'transparent',border:'1px dashed #c8c8c0',borderRadius:'10px',color:'#888',fontSize:'14px',marginBottom:'24px'}}>
                <i className="ti ti-user-plus" style={{fontSize:'16px'}} /> Ajouter un travailleur
              </button>
            )}

            <div style={{borderTop:'1px solid #e8e8e0',paddingTop:'20px'}}>
              {showPin ? (
                <div style={S.card}>
                  <span style={S.lbl}>Code PIN patron</span>
                  <div style={{display:'flex',gap:'8px'}}>
                    <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setPinErr(false);}} onKeyDown={e=>e.key==='Enter'&&checkPin()} placeholder="• • • •" style={{letterSpacing:'6px',fontSize:'18px'}} autoFocus />
                    <button onClick={checkPin} style={{padding:'0 16px',background:'#173404',color:'#C0DD97',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:600}}>OK</button>
                  </div>
                  {pinErr && <p style={{color:'#c0392b',fontSize:'12px',marginTop:'6px'}}>Code incorrect</p>}
                  <button onClick={()=>{setShowPin(false);setPin('');setPinErr(false);}} style={{marginTop:'10px',background:'none',border:'none',color:'#888',fontSize:'13px'}}>Annuler</button>
                </div>
              ) : (
                <button onClick={()=>setShowPin(true)} style={{display:'flex',alignItems:'center',gap:'8px',width:'100%',padding:'10px 0',background:'transparent',border:'none',color:'#888',fontSize:'13px',justifyContent:'center'}}>
                  <i className="ti ti-lock" style={{fontSize:'15px'}} /> Accès patron
                </button>
              )}
            </div>

            {!window._fbOk && (
              <div style={{marginTop:'16px',background:'#FAEEDA',border:'1px solid #EF9F27',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#633806'}}>
                <strong>Mode local activé</strong> — Les données restent sur cet appareil uniquement. Configurez Firebase pour partager entre plusieurs téléphones.
              </div>
            )}
          </div>
        </div>
      );

      /* ── SAISIE ── */
      if (screen === 'entry') return (
        <div>
          <Header right={<>
            <button onClick={()=>setShowHist(v=>!v)} style={S.ibtn(showHist)}><i className="ti ti-clock-hour-4" style={{fontSize:'17px'}} /></button>
            <button onClick={logout} style={S.ibtn(false)}><i className="ti ti-logout" style={{fontSize:'17px'}} /></button>
          </>} />
          <div style={{padding:'14px 16px 32px'}}>
            <div style={{marginBottom:'14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'15px',fontWeight:600}}>{user.name}</span>
              <span style={{fontSize:'12px',color:'#888'}}>{new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</span>
            </div>

            {showHist && (
              <div style={{...S.card,marginBottom:'14px'}}>
                <span style={S.lbl}>Mon historique</span>
                {myRecs.length === 0
                  ? <p style={{color:'#888',fontSize:'13px'}}>Aucune saisie pour le moment.</p>
                  : myRecs.slice(0,15).map(r => (
                    <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #f0f0e8'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                        <span style={{fontSize:'13px',color:'#888'}}>{fmtDate(r.date)}</span>
                        <TypeBadge type={r.type} />
                      </div>
                      <span style={{fontSize:'14px',fontWeight:600}}>{r.hours}h</span>
                    </div>
                  ))
                }
              </div>
            )}

            {saved && (
              <div style={{background:'#EAF3DE',border:'1px solid #97C459',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px',display:'flex',alignItems:'center',gap:'8px'}}>
                <i className="ti ti-circle-check" style={{fontSize:'18px',color:'#27500A'}} />
                <span style={{color:'#27500A',fontSize:'14px',fontWeight:500}}>Journée enregistrée</span>
              </div>
            )}

            <div style={S.card}>
              <span style={S.lbl}>Date</span>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{border:'none',padding:0,background:'transparent',fontSize:'15px',width:'auto'}} />
            </div>

            <div style={{marginBottom:'10px'}}>
              <span style={S.lbl}>Type de travail</span>
              {TYPES.map(t => (
                <button key={t.id} onClick={()=>setType(t.id)} style={{display:'flex',alignItems:'center',gap:'12px',width:'100%',padding:'13px 14px',marginBottom:'8px',background:type===t.id?t.bg:'#fff',border:type===t.id?`2px solid ${t.border}`:'1px solid #d8d8d0',borderRadius:'10px',textAlign:'left'}}>
                  <div style={{width:'40px',height:'40px',borderRadius:'10px',background:type===t.id?t.color:'#f4f4f0',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <i className={`ti ${t.icon}`} style={{fontSize:'20px',color:type===t.id?'#fff':'#888'}} />
                  </div>
                  <span style={{fontSize:'16px',fontWeight:type===t.id?600:400,color:type===t.id?t.color:'#1a1a1a'}}>{t.label}</span>
                  {type===t.id && <i className="ti ti-check" style={{fontSize:'18px',color:t.color,marginLeft:'auto'}} />}
                </button>
              ))}
            </div>

            <div style={{...S.card,marginBottom:'14px'}}>
              <span style={S.lbl}>Heures travaillées</span>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px'}}>
                <button onClick={()=>setHours(h=>Math.max(0.5,+(+h-0.5).toFixed(1)))} style={{width:'44px',height:'44px',borderRadius:'50%',background:'#f4f4f0',border:'1px solid #d8d8d0',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <i className="ti ti-minus" style={{fontSize:'18px',color:'#1a1a1a'}} />
                </button>
                <div style={{textAlign:'center',flex:1}}>
                  <span style={{fontSize:'36px',fontWeight:600}}>{hours}</span>
                  <span style={{fontSize:'18px',color:'#888',marginLeft:'3px'}}>h</span>
                  {hours===8 && <div style={{fontSize:'11px',color:'#27500A',marginTop:'2px'}}>Journée complète</div>}
                </div>
                <button onClick={()=>setHours(h=>Math.min(24,+(+h+0.5).toFixed(1)))} style={{width:'44px',height:'44px',borderRadius:'50%',background:'#f4f4f0',border:'1px solid #d8d8d0',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <i className="ti ti-plus" style={{fontSize:'18px',color:'#1a1a1a'}} />
                </button>
              </div>
            </div>

            <button onClick={submit} disabled={!type||saving} style={{width:'100%',padding:'16px',background:!type?'#e8e8e0':'#173404',border:'none',borderRadius:'12px',cursor:!type?'not-allowed':'pointer',color:!type?'#aaa':'#C0DD97',fontSize:'16px',fontWeight:600}}>
              {saving?'Enregistrement…':!type?'Choisissez un type de travail':'Enregistrer la journée'}
            </button>
          </div>
        </div>
      );

      /* ── PATRON ── */
      const totalDays = adminRecs.reduce((s,r)=>s+(r.hours/8),0);
      return (
        <div>
          <Header sub="Tableau de bord" right={
            <button onClick={()=>setScreen('login')} style={S.ibtn(false)}><i className="ti ti-arrow-left" style={{fontSize:'17px'}} /></button>
          } />
          <div style={{padding:'14px 16px 32px'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,minmax(0,1fr))',gap:'10px',marginBottom:'14px'}}>
              {[{l:'Travailleurs',v:workers.length,i:'ti-users'},{l:'Saisies',v:adminRecs.length,i:'ti-file-text'},{l:'Heures totales',v:`${totalH}h`,i:'ti-clock'},{l:'Journées éq.',v:totalDays.toFixed(1),i:'ti-sun'}].map(s=>(
                <div key={s.l} style={{background:'#ebebE3',borderRadius:'10px',padding:'12px 14px'}}>
                  <p style={{fontSize:'11px',color:'#888',marginBottom:'4px',display:'flex',alignItems:'center',gap:'5px',textTransform:'uppercase',letterSpacing:'0.4px'}}><i className={`ti ${s.i}`} style={{fontSize:'13px'}} />{s.l}</p>
                  <p style={{fontSize:'22px',fontWeight:600}}>{s.v}</p>
                </div>
              ))}
            </div>

            <div style={{...S.card,marginBottom:'12px'}}>
              <span style={S.lbl}>Filtres</span>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,minmax(0,1fr))',gap:'8px'}}>
                <select value={fWorker} onChange={e=>setFWorker(e.target.value)} style={{fontSize:'13px',padding:'8px 10px'}}>
                  <option value="">Tous les travailleurs</option>
                  {workers.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                </select>
                <select value={fType} onChange={e=>setFType(e.target.value)} style={{fontSize:'13px',padding:'8px 10px'}}>
                  <option value="">Tous les types</option>
                  {TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>
            </div>

            {adminRecs.length===0 ? (
              <div style={{textAlign:'center',padding:'40px 16px',color:'#888',fontSize:'14px'}}>
                <i className="ti ti-database-off" style={{fontSize:'32px',display:'block',marginBottom:'10px',color:'#ccc'}} />
                Aucune saisie enregistrée
              </div>
            ) : adminRecs.map(r => (
              <div key={r.id} style={{...S.card,display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'7px',padding:'11px 14px'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                    <span style={{fontSize:'14px',fontWeight:500}}>{r.wName}</span>
                    <TypeBadge type={r.type} />
                  </div>
                  <span style={{fontSize:'12px',color:'#888'}}>{fmtDate(r.date)}</span>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <span style={{fontSize:'22px',fontWeight:600}}>{r.hours}</span>
                  <span style={{fontSize:'13px',color:'#888'}}>h</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>

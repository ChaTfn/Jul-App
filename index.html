<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#173404" />
 
  <link rel="manifest" href="manifest.json" />
 
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
 
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jul'App" />
 
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
 
  <title>Jul'App — Gestionnaire d'heures de terrain</title>
  <meta name="description" content="Saisie des heures de travail par type : terrassement, agricole, atelier." />
  <meta name="mobile-web-app-capable" content="yes" />
 
</head>
<body>
  <div id="root"></div>
 
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('sw.js')
          .then((reg) => console.log('[SW] Enregistré :', reg.scope))
          .catch((err) => console.error('[SW] Erreur :', err));
      });
    }
  </script>
</body>
</html>
</body>
</html>
